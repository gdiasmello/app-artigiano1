<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>PiZZA Master v1.0.0</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --bg-main: #121212; 
            --bg-card: #1E1E1E; 
            --cor-primaria: #FFAB00; 
            --cor-secundaria: #00B0FF;
            --cor-sucesso: #00E676;
            --cor-erro: #FF5252;
            --text-main: #FFFFFF; 
            --text-sec: #AAAAAA;
        }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            /* Removido overscroll-behavior-y para garantir scroll natural */
            overflow-x: hidden; /* Evita balanço lateral */
            overflow-y: auto;   /* Garante scroll vertical */
            -webkit-overflow-scrolling: touch; /* Scroll suave no iOS */
            -webkit-tap-highlight-color: transparent; 
        }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background-color: var(--bg-card); border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); margin-bottom: 20px; border: 1px solid #333; }
        .btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 10px; 
            border: none; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        
        /* Escudo de Erro */
        #escudo-erro { 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #121212; 
            color: #FFF; 
            text-align: center; 
            padding: 30px; 
            position: fixed;
            top: 0; left: 0; width: 100%; z-index: 9999;
        }

        /* Inputs Customizados */
        .input-dark { 
            width: 100%; 
            padding: 15px; 
            background: #2C2C2C; 
            border: 1px solid #444; 
            border-radius: 10px; 
            color: white; 
            font-size: 1rem; 
            box-sizing: border-box; 
            outline: none; 
            transition: border-color 0.3s;
        }
        .input-dark:focus { border-color: var(--cor-primaria); }
        
        [v-cloak] { display: none; }
    </style>
    <script>
        // Tratamento de Erros Global (Executa antes de tudo)
        window.exibirErroFatal = function(titulo, erro, info = '') {
            console.error(titulo, erro, info);
            
            // Tenta pegar os elementos, ou espera o DOM carregar
            const mostrar = () => {
                const escudo = document.getElementById('escudo-erro');
                const detalhes = document.getElementById('detalhes-erro');
                
                if (escudo && detalhes) {
                    escudo.style.display = 'flex';
                    
                    const dataHora = new Date().toLocaleString('pt-BR');
                    const userAgent = navigator.userAgent;
                    const url = window.location.href;
                    
                    let mensagemErro = 'Erro desconhecido';
                    let stackErro = 'N/A';

                    try {
                        if (erro) {
                            mensagemErro = erro.message || erro.toString();
                            stackErro = erro.stack || 'N/A';
                        }
                    } catch (e) {
                        mensagemErro = 'Erro ao processar mensagem de erro';
                    }
                    
                    const relatorio = `
[RELATÓRIO DE ERRO - ${dataHora}]
----------------------------------------
TIPO: ${titulo}
MENSAGEM: ${mensagemErro}
STACK: ${stackErro}
INFO VUE: ${info || 'N/A'}
----------------------------------------
AMBIENTE:
URL: ${url}
User Agent: ${userAgent}
                    `.trim();
                    
                    detalhes.value = relatorio;
                }
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', mostrar);
            } else {
                mostrar();
            }
        };

        window.onerror = function(msg, url, line, col, error) {
            window.exibirErroFatal("ERRO CRÍTICO (LOAD)", error || msg, `Linha: ${line}, Col: ${col}, URL: ${url}`);
            return false;
        };

        window.onunhandledrejection = function(event) {
            window.exibirErroFatal("PROMISE REJEITADA (LOAD)", event.reason);
        };
    </script>
</head>
<body>

    <div id="escudo-erro">
        <i class="fas fa-bug animate__animated animate__shakeX" style="font-size: 4rem; color: var(--cor-erro); margin-bottom: 25px;"></i>
        <h2 style="margin-bottom: 10px;">Ops! Ocorreu um erro inesperado.</h2>
        <p style="color: #AAA; margin-bottom: 20px; line-height: 1.5; max-width: 500px;">
            O sistema encontrou um problema e precisou parar. Por favor, copie o relatório abaixo e envie para o suporte.
        </p>
        
        <div style="position: relative; width: 100%; max-width: 600px; margin-bottom: 20px;">
            <textarea id="detalhes-erro" readonly style="width: 100%; height: 200px; background: #1A1A1A; border: 1px solid #333; color: #FF5252; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; resize: none;"></textarea>
            <button onclick="copiarErro()" style="position: absolute; top: 10px; right: 10px; background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">
                <i class="fas fa-copy"></i> Copiar
            </button>
        </div>

        <div style="display: flex; gap: 10px; width: 100%; max-width: 400px;">
            <button onclick="location.reload();" class="btn" style="background: var(--cor-primaria); color: #121212; flex: 1;">
                <i class="fas fa-sync"></i> TENTAR NOVAMENTE
            </button>
        </div>
        
        <button onclick="localStorage.clear(); location.reload();" style="background: none; border: none; color: #555; margin-top: 20px; text-decoration: underline; cursor: pointer; font-size: 0.8rem;">
            Limpar Cache e Resetar Tudo (Último Recurso)
        </button>

        <script>
            function copiarErro() {
                const texto = document.getElementById('detalhes-erro');
                texto.select();
                document.execCommand('copy');
                alert('Erro copiado para a área de transferência!');
            }
        </script>
    </div>

    <div id="loading-debug" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #0F0; font-family: monospace; padding: 20px; z-index: 9998; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; margin-bottom: 20px;"></i>
        <h2>INICIANDO SISTEMA...</h2>
        <p id="status-loading">Carregando módulos...</p>
        <button onclick="document.getElementById('loading-debug').style.display='none'" style="margin-top: 20px; padding: 10px; background: #333; color: white; border: 1px solid #555;">Ocultar Tela de Carregamento</button>
    </div>

    <div id="app">
        <!-- Componentes Dinâmicos -->
        <component :is="viewAtual"></component>
    </div>

    <!-- Firebase & Vue via CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
